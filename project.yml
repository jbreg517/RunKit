name: RunKit
options:
  bundleIdPrefix: com.runkit
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.03"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  RunKit:
    type: application
    platform: iOS
    sources:
      - path: RunKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.runkit.app
        INFOPLIST_FILE: RunKit/Info.plist
        CODE_SIGN_ENTITLEMENTS: RunKit/RunKit.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic

schemes:
  RunKit:
    build:
      targets:
        RunKit: all
    run:
      config: Debug
    archive:
      config: Release
